<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blef - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../shared/styles.css" />
</head>
<body>
  <main class="page" style="max-width: 560px; min-height: calc(100vh - 64px); display: grid; place-items: center;">
    <section class="card panel" style="width: 100%; padding: 24px;">
      <div class="brand" style="margin-bottom: 10px;">
        <img src="../shared/logo.svg" alt="Blef logo" />
        <span>Blef / Login</span>
      </div>
      <p class="muted" style="margin-top: 0;">Use static credentials in this mock screen.</p>

      <form>
        <div style="margin-bottom: 12px;">
          <label class="label" for="username">Username</label>
          <input class="input" id="username" name="username" type="text" value="player_one" />
        </div>

        <div style="margin-bottom: 16px;">
          <label class="label" for="password">Password</label>
          <input class="input" id="password" name="password" type="password" value="secret123" />
        </div>

        <button class="button primary" type="button" style="width: 100%;">Log In</button>
      </form>

      <p class="footer-note">No interaction with backend. This is visual-only mock.</p>
      <a class="button ghost" href="../landing/index.html" style="margin-top: 8px;">Back</a>
    </section>
  </main>
</body>
</html>
